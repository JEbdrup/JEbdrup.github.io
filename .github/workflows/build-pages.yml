name: Build and Deploy PDF Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find source PDF
        id: source_pdf
        shell: bash
        run: |
          set -euo pipefail
          PDF_FILE="$(find . -maxdepth 1 -type f \( -iname '*.pdf' \) | sort | head -n 1)"
          if [ -z "$PDF_FILE" ]; then
            echo "No PDF found in repository root. Add a PDF file next to pdf_to_github_pages.py."
            exit 1
          fi
          echo "pdf=$PDF_FILE" >> "$GITHUB_OUTPUT"

      - name: Build docs site
        run: |
          python pdf_to_github_pages.py "${{ steps.source_pdf.outputs.pdf }}" --output docs --title "${{ github.event.repository.name }}" --dpi 240 --image-format png --thumb-width 300

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
